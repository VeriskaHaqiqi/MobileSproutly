name: sproutly
description: Plant Care & Expert Consultation App
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  google_fonts: ^6.1.0

  # State management
  provider: ^6.0.0

  # HTTP Client
  dio: ^5.4.0

  # Secure Storage untuk token JWT/Sanctum
  flutter_secure_storage: ^9.0.0

  # Lain-lain
  image_picker: ^1.0.0
  file_picker: ^8.0.0

  # Form validasi
  form_field_validator: ^1.1.0

  # PDF invoice
  pdf: ^3.10.8
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"